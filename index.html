<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moy Diary Pro - Edit & Delete</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .suggestion-box { position: absolute; z-index: 50; width: 100%; background: white; border: 1px solid #ddd; max-height: 150px; overflow-y: auto; border-radius: 8px; }
        .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .suggestion-item:hover { background-color: #f0f7ff; }
    </style>
</head>
<body class="bg-gray-100 p-3 font-sans pb-20">

    <div class="max-w-xl mx-auto bg-white rounded-2xl shadow-2xl p-6 border-t-8 border-indigo-600">
        <h2 id="formTitle" class="text-xl font-black text-indigo-700 text-center uppercase">Moy Diary / மொய் டைரி</h2>
        
        <div class="mt-6 space-y-4">
            <input type="hidden" id="editId">
            
            <div>
                <label class="text-xs font-bold text-gray-500 uppercase">பெயர் / Name</label>
                <input id="name" type="text" oninput="handleInput(this, 'name')" class="w-full border-2 p-3 rounded-xl outline-none" placeholder="Ranjith Kumar">
                <div id="nameSuggestions" class="suggestion-box hidden shadow-lg"></div>
            </div>

            <div>
                <label class="text-xs font-bold text-gray-500 uppercase">ஊர் / Area</label>
                <input id="city" type="text" oninput="handleInput(this, 'city')" class="w-full border-2 p-3 rounded-xl outline-none" placeholder="Cuddalore">
                <div id="citySuggestions" class="suggestion-box hidden shadow-lg"></div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <input id="cash" type="number" placeholder="ரூபாய் / Cash (₹)" class="border-2 p-3 rounded-xl">
                <input id="gold" type="number" step="0.01" placeholder="தங்கம் / Gold (g)" class="border-2 p-3 rounded-xl">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <select id="type" class="border-2 p-3 rounded-xl bg-white">
                    <option value="Received">வரவு (Received)</option>
                    <option value="Returned">செலுத்தியது (Returned)</option>
                </select>
                <input id="date" type="date" class="border-2 p-3 rounded-xl">
            </div>

            <input id="event" type="text" oninput="handleInput(this, 'event')" placeholder="விசேஷம் / Event" class="w-full border-2 p-3 rounded-xl">
            <textarea id="notes" placeholder="குறிப்பு / Notes..." class="w-full border-2 p-3 rounded-xl h-16"></textarea>

            <div class="flex gap-2">
                <button onclick="saveMoy()" id="saveBtn" class="flex-1 bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition">SAVE / சேமி</button>
                <button onclick="resetForm()" id="cancelBtn" class="hidden bg-gray-400 text-white font-bold px-4 rounded-2xl">Cancel</button>
            </div>
        </div>
    </div>

    <div class="max-w-xl mx-auto mt-8">
        <div class="bg-white p-5 rounded-2xl shadow-md border">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-gray-700">தேடல் / Search</h3>
                <button onclick="exportToExcel()" class="bg-green-600 text-white text-[10px] font-bold py-2 px-3 rounded-lg">EXCEL DOWNLOAD</button>
            </div>
            <input type="text" id="search" onkeyup="renderList()" placeholder="Type Name or Area..." class="w-full border-b-2 border-indigo-300 p-2 text-lg outline-none">
        </div>

        <div id="moyList" class="mt-6 space-y-4"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBLWrs7rGUhfRDuD8dPMZdjjCYMSAtPleM",
            authDomain: "family-dairy-192b9.firebaseapp.com",
            projectId: "family-dairy-192b9",
            storageBucket: "family-dairy-192b9.firebasestorage.app",
            messagingSenderId: "1024399308563",
            appId: "1:1024399308563:web:7eda6313a984c5b3facce6"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        document.getElementById('date').valueAsDate = new Date();
        let allRecords = [];

        function handleInput(el, field) {
            el.value = el.value.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
            if(field !== 'event') showSuggestions(field);
        }

        async function saveMoy() {
            const id = document.getElementById('editId').value;
            const data = {
                name: document.getElementById('name').value.trim(),
                city: document.getElementById('city').value.trim(),
                cash: Number(document.getElementById('cash').value) || 0,
                gold: Number(document.getElementById('gold').value) || 0,
                type: document.getElementById('type').value,
                event: document.getElementById('event').value,
                notes: document.getElementById('notes').value,
                date: document.getElementById('date').value
            };

            if(!data.name || !data.city) return alert("பெயர் மற்றும் ஊர் அவசியம்!");

            if(id) {
                await db.collection("moy_records").doc(id).update(data);
                alert("Updated!");
            } else {
                await db.collection("moy_records").add(data);
                alert("Saved!");
            }
            resetForm();
            loadData();
        }

        async function loadData() {
            const snapshot = await db.collection("moy_records").orderBy("date", "desc").get();
            allRecords = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderList();
        }

        function renderList() {
            const search = document.getElementById('search').value.toLowerCase();
            const list = document.getElementById('moyList');
            list.innerHTML = "";

            const filtered = allRecords.filter(d => d.name.toLowerCase().includes(search) || d.city.toLowerCase().includes(search));

            if(search.length > 2 && filtered.length > 0) {
                let tin = 0, gin = 0, tout = 0, gout = 0;
                filtered.forEach(d => {
                    if(d.type === "Received") { tin += d.cash; gin += d.gold; }
                    else { tout += d.cash; gout += d.gold; }
                });
                list.innerHTML = `<div class="bg-indigo-900 text-white p-4 rounded-2xl mb-4">
                    <p class="text-[10px] opacity-70 uppercase font-bold">Total Summary</p>
                    <div class="grid grid-cols-2 mt-2">
                        <div><p class="text-xs">IN: <b class="text-green-400">₹${tin}</b> | ${gin}g</p></div>
                        <div><p class="text-xs text-right">OUT: <b class="text-orange-400">₹${tout}</b> | ${gout}g</p></div>
                    </div>
                </div>`;
            }

            filtered.forEach(d => {
                const isReceived = d.type === "Received";
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow border-l-8 ${isReceived ? 'border-green-500' : 'border-orange-500'}">
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="font-black text-gray-800">${d.name}</h4>
                                <p class="text-[10px] text-blue-600 font-bold">${d.city}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="editMoy('${d.id}')" class="text-blue-500 font-bold text-[10px] border px-2 py-1 rounded">EDIT</button>
                                <button onclick="deleteMoy('${d.id}')" class="text-red-500 font-bold text-[10px] border px-2 py-1 rounded">DEL</button>
                            </div>
                        </div>
                        <div class="mt-2 text-sm flex justify-between bg-gray-50 p-2 rounded">
                            <span>💰 ₹${d.cash}</span> <span>💍 ${d.gold}g</span>
                        </div>
                        <p class="text-[9px] mt-2 text-gray-400 font-bold uppercase">${d.date} | ${d.event}</p>
                    </div>`;
            });
        }

        function editMoy(id) {
            const d = allRecords.find(r => r.id === id);
            document.getElementById('editId').value = id;
            document.getElementById('name').value = d.name;
            document.getElementById('city').value = d.city;
            document.getElementById('cash').value = d.cash;
            document.getElementById('gold').value = d.gold;
            document.getElementById('type').value = d.type;
            document.getElementById('event').value = d.event;
            document.getElementById('notes').value = d.notes;
            document.getElementById('date').value = d.date;
            document.getElementById('saveBtn').innerText = "UPDATE / திருத்து";
            document.getElementById('cancelBtn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteMoy(id) {
            if(confirm("நிச்சயமாக இந்த மொய் கணக்கை நீக்க வேண்டுமா? / Are you sure?")) {
                await db.collection("moy_records").doc(id).delete();
                alert("Deleted!");
                loadData();
            }
        }

        function resetForm() {
            document.getElementById('editId').value = "";
            document.getElementById('name').value = "";
            document.getElementById('city').value = "";
            document.getElementById('cash').value = "";
            document.getElementById('gold').value = "";
            document.getElementById('notes').value = "";
            document.getElementById('event').value = "";
            document.getElementById('saveBtn').innerText = "SAVE / சேமி";
            document.getElementById('cancelBtn').classList.add('hidden');
            document.getElementById('date').valueAsDate = new Date();
        }

        function exportToExcel() {
            const data = allRecords.map(({id, ...rest}) => rest);
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Records");
            XLSX.writeFile(wb, "Moy_Diary.xlsx");
        }

        function showSuggestions(field) {
            const val = document.getElementById(field).value.toLowerCase();
            const box = document.getElementById(field + 'Suggestions');
            if(val.length < 1) { box.classList.add('hidden'); return; }
            const suggestions = [...new Set(allRecords.map(r => r[field]))].filter(i => i.toLowerCase().includes(val)).slice(0, 5);
            if(suggestions.length > 0) {
                box.innerHTML = suggestions.map(s => `<div class="suggestion-item" onclick="selectSuggestion('${field}', '${s}')">${s}</div>`).join('');
                box.classList.remove('hidden');
            } else { box.classList.add('hidden'); }
        }

        function selectSuggestion(field, value) {
            document.getElementById(field).value = value;
            document.getElementById(field + 'Suggestions').classList.add('hidden');
        }

        loadData();
    </script>
</body>
</html>
