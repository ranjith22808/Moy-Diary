<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moy Diary Ultra Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3209/3209265.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-glass:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
            transform: translateY(-2px);
        }

        .suggestion-box {
            position: absolute; z-index: 100; width: 100%; 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem; border: 1px solid #e2e8f0;
            max-height: 200px; overflow-y: auto; margin-top: 5px;
        }

        .btn-animate {
            transition: all 0.3s ease;
        }

        .btn-animate:active {
            transform: scale(0.92);
        }

        /* Hide Scrollbar */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="bali-banner" class="max-w-xl mx-auto mb-6 bg-white/20 backdrop-blur-md rounded-2xl p-3 text-center border border-white/30 text-white font-bold text-sm hidden">
        🏝️ <span id="bali-timer">Bali Trip Loading...</span>
    </div>

    <div class="max-w-xl mx-auto glass rounded-[2.5rem] p-6 md:p-10 mb-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-black text-slate-800 tracking-tighter">Moy Diary <span class="text-indigo-600">Pro</span></h1>
            <p class="text-[10px] font-extrabold text-slate-400 uppercase tracking-[0.3em] mt-1">Digital Ledger by Matisha Infotec</p>
        </header>

        <div class="space-y-5">
            <input type="hidden" id="editId">
            
            <div class="grid grid-cols-2 gap-3 bg-indigo-600/5 p-4 rounded-3xl border border-indigo-100">
                <div class="relative">
                    <label class="text-[9px] font-black text-indigo-400 uppercase">விசேஷம் / Event</label>
                    <input id="event" type="text" oninput="handleInput(this, 'event')" placeholder="Event Name" class="w-full bg-transparent border-b-2 border-indigo-200 py-1 outline-none font-black text-indigo-900 uppercase">
                    <div id="eventSuggestions" class="suggestion-box hidden shadow-xl"></div>
                </div>
                <div>
                    <label class="text-[9px] font-black text-indigo-400 uppercase">தேதி / Date</label>
                    <input id="date" type="date" class="w-full bg-transparent border-b-2 border-indigo-200 py-1 outline-none font-black text-indigo-900">
                </div>
            </div>

            <div class="relative">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-2">பெயர் / Name</label>
                <input id="name" type="text" oninput="handleInput(this, 'name')" class="input-glass w-full p-4 rounded-2xl outline-none font-bold text-slate-800" placeholder="Ranjith Kumar">
                <div id="nameSuggestions" class="suggestion-box hidden shadow-xl"></div>
            </div>

            <div class="relative">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-2">ஊர் / Area</label>
                <input id="city" type="text" oninput="handleInput(this, 'city')" class="input-glass w-full p-4 rounded-2xl outline-none font-bold text-slate-800" placeholder="Cuddalore">
                <div id="citySuggestions" class="suggestion-box hidden shadow-xl"></div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="relative">
                    <label class="text-[10px] font-black text-indigo-400 uppercase ml-2">பணம் / Cash (₹)</label>
                    <input id="cash" type="number" class="input-glass w-full p-4 rounded-2xl outline-none font-black text-indigo-600 text-xl" placeholder="0">
                </div>
                <div class="relative">
                    <label class="text-[10px] font-black text-amber-500 uppercase ml-2">தங்கம் / Gold (g)</label>
                    <input id="gold" type="number" step="0.01" class="input-glass w-full p-4 rounded-2xl outline-none font-black text-amber-600 text-xl" placeholder="0.00">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <select id="type" class="input-glass w-full p-4 rounded-2xl font-bold text-slate-600 outline-none">
                    <option value="Received">வரவு (Received)</option>
                    <option value="Returned">செலுத்தியது (Returned)</option>
                </select>
                <textarea id="notes" placeholder="Notes / குறிப்பு..." class="input-glass w-full p-3 rounded-2xl h-14 text-sm font-semibold outline-none resize-none"></textarea>
            </div>

            <div class="flex gap-3 pt-4">
                <button onclick="saveMoy()" id="saveBtn" class="btn-animate flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-black py-5 rounded-3xl shadow-xl shadow-indigo-200 uppercase tracking-widest text-sm">SAVE RECORD / சேமி</button>
                <button onclick="resetAllFields()" class="btn-animate px-6 bg-slate-100 text-slate-400 font-black rounded-3xl text-[10px] uppercase">Reset</button>
            </div>
        </div>
    </div>

    <div class="max-w-xl mx-auto px-2">
        <div class="flex justify-between items-end mb-6">
            <h3 class="text-2xl font-black text-white drop-shadow-md">Search Reports</h3>
            <button onclick="exportToExcel()" class="bg-white/20 backdrop-blur-md text-white text-[10px] font-black py-2 px-5 rounded-full border border-white/40 shadow-lg uppercase">Download Excel 📥</button>
        </div>
        
        <input type="text" id="search" onkeyup="renderList()" placeholder="பெயர், ஊர் அல்லது விசேஷம்..." class="w-full bg-white/20 backdrop-blur-lg border-b-4 border-white/50 p-4 text-2xl outline-none font-black text-white placeholder-white/40 mb-8 rounded-2xl shadow-inner">

        <div id="moyList" class="space-y-6 pb-20"></div>
    </div>

    <script>
        // Firebase Config (Family Diary)
        const firebaseConfig = {
            apiKey: "AIzaSyBLWrs7rGUhfRDuD8dPMZdjjCYMSAtPleM",
            authDomain: "family-dairy-192b9.firebaseapp.com",
            projectId: "family-dairy-192b9",
            storageBucket: "family-dairy-192b9.firebasestorage.app",
            messagingSenderId: "1024399308563",
            appId: "1:1024399308563:web:7eda6313a984c5b3facce6"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        document.getElementById('date').valueAsDate = new Date();
        let allRecords = [];

        // Bali Countdown
        function updateBaliTimer() {
            const baliDate = new Date("March 12, 2026 00:00:00").getTime();
            const now = new Date().getTime();
            const diff = baliDate - now;
            if (diff > 0) {
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById('bali-banner').classList.remove('hidden');
                document.getElementById('bali-timer').innerText = `Bali Trip in ${days}d ${hours}h! 🏝️`;
            }
        }
        updateBaliTimer();

        function handleInput(el, field) {
            el.value = el.value.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
            showSuggestions(field);
        }

        async function saveMoy() {
            const id = document.getElementById('editId').value;
            const name = document.getElementById('name').value.trim();
            const city = document.getElementById('city').value.trim();
            const eventName = document.getElementById('event').value.trim();
            
            if(!name || !city || !eventName) return alert("விவரங்களை நிரப்பவும்!");

            if (!id) {
                const isDup = allRecords.find(r => r.name.toLowerCase() === name.toLowerCase() && r.city.toLowerCase() === city.toLowerCase() && r.event.toLowerCase() === eventName.toLowerCase());
                if (isDup && !confirm(`Duplicate: ${name} ஏற்கனவே இந்த விசேஷத்தில் உள்ளார். சேமிக்கவா?`)) return;
            }

            const data = { name, city, cash: Number(document.getElementById('cash').value) || 0, gold: Number(document.getElementById('gold').value) || 0, type: document.getElementById('type').value, event: eventName, notes: document.getElementById('notes').value, date: document.getElementById('date').value };

            if(id) await db.collection("moy_records").doc(id).update(data);
            else await db.collection("moy_records").add(data);
            
            resetEntryFields();
            loadData();
        }

        async function loadData() {
            const snapshot = await db.collection("moy_records").orderBy("date", "desc").get();
            allRecords = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderList();
        }

        function renderList() {
            const search = document.getElementById('search').value.trim();
            const list = document.getElementById('moyList');
            list.innerHTML = "";

            const filtered = allRecords.filter(d => d.name.toLowerCase().includes(search.toLowerCase()) || d.city.toLowerCase().includes(search.toLowerCase()) || d.event.toLowerCase().includes(search.toLowerCase()));

            if(search.length > 2 && filtered.length > 0) {
                let tin = 0, gin = 0, tout = 0, gout = 0;
                filtered.forEach(d => { if(d.type === "Received") { tin += d.cash; gin += d.gold; } else { tout += d.cash; gout += d.gold; } });

                let bCash = tin - tout;
                let bGold = gin - gout;

                list.innerHTML = `
                <div class="glass p-6 rounded-[2.5rem] mb-8 shadow-2xl border-b-8 border-indigo-500">
                    <p class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-4 underline">${search} - Summary</p>
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-indigo-50 p-4 rounded-3xl border border-indigo-100">
                            <p class="text-[9px] text-indigo-400 font-black uppercase">பெற்றது (IN)</p>
                            <p class="text-2xl font-black text-indigo-900">₹${tin}</p>
                            <p class="text-[10px] font-bold text-indigo-300">💍 ${gin.toFixed(2)}g</p>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-3xl border border-slate-200">
                            <p class="text-[9px] text-slate-400 font-black uppercase">செலுத்தியது (OUT)</p>
                            <p class="text-2xl font-black text-slate-800">₹${tout}</p>
                            <p class="text-[10px] font-bold text-slate-300">💍 ${gout.toFixed(2)}g</p>
                        </div>
                    </div>
                    <div class="pt-4 border-t border-slate-100 flex justify-between items-center px-2">
                        <span class="text-[10px] font-black text-slate-400 uppercase">Balance:</span>
                        <div class="text-right">
                            <p class="text-xl font-black ${bCash > 0 ? 'text-rose-500' : 'text-emerald-500'}">₹${Math.abs(bCash)} <span class="text-[10px] uppercase">${bCash > 0 ? 'To Give / தர வேண்டும்' : 'To Receive / வர வேண்டும்'}</span></p>
                            <p class="text-[10px] font-bold text-slate-400 italic">${Math.abs(bGold).toFixed(2)}g Gold ${bGold > 0 ? 'To Give' : 'To Receive'}</p>
                        </div>
                    </div>
                </div>`;
            }

            filtered.forEach(d => {
                const isRec = d.type === "Received";
                list.innerHTML += `
                    <div class="bg-white/95 backdrop-blur-md p-6 rounded-[2.5rem] shadow-xl border-l-[12px] ${isRec ? 'border-indigo-500' : 'border-amber-400'} transition-all hover:scale-[1.02]">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h4 class="font-black text-slate-800 text-xl leading-tight">${d.name}</h4>
                                <p class="text-[10px] text-indigo-500 font-black uppercase tracking-[0.2em]">${d.city}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="editMoy('${d.id}')" class="text-indigo-600 bg-indigo-50 p-2 px-3 rounded-xl text-[10px] font-black uppercase">Edit</button>
                                <button onclick="deleteMoy('${d.id}')" class="text-rose-500 bg-rose-50 p-2 px-3 rounded-xl text-[10px] font-black uppercase">Del</button>
                            </div>
                        </div>
                        
                        <div class="bg-slate-800 text-white text-[10px] font-black uppercase tracking-[0.2em] py-2 px-4 rounded-full inline-block mb-4 shadow-md italic">
                            🎊 ${d.event}
                        </div>

                        <div class="grid grid-cols-2 text-lg bg-slate-50 p-5 rounded-3xl font-black border border-slate-100 shadow-inner italic">
                            <span class="text-slate-700">💵 ₹${d.cash}</span> 
                            <span class="text-right text-amber-600">💍 ${d.gold}g</span>
                        </div>
                        
                        <div class="flex justify-between items-center mt-4 px-2">
                             <p class="text-[9px] text-slate-300 font-black uppercase tracking-widest">${d.date}</p>
                             ${d.notes ? `<p class="text-[10px] bg-amber-50 text-amber-600 p-2 px-3 rounded-xl font-bold italic">Note: ${d.notes}</p>` : '<span></span>'}
                        </div>
                    </div>`;
            });
        }

        function editMoy(id) {
            const d = allRecords.find(r => r.id === id);
            document.getElementById('editId').value = id;
            document.getElementById('name').value = d.name;
            document.getElementById('city').value = d.city;
            document.getElementById('cash').value = d.cash;
            document.getElementById('gold').value = d.gold;
            document.getElementById('type').value = d.type;
            document.getElementById('event').value = d.event;
            document.getElementById('notes').value = d.notes;
            document.getElementById('date').value = d.date;
            document.getElementById('saveBtn').innerText = "UPDATE RECORD";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteMoy(id) { if(confirm("Permanently Delete?")) { await db.collection("moy_records").doc(id).delete(); loadData(); } }

        function resetEntryFields() {
            document.getElementById('editId').value = "";
            document.getElementById('name').value = "";
            document.getElementById('city').value = "";
            document.getElementById('cash').value = "";
            document.getElementById('gold').value = "";
            document.getElementById('notes').value = "";
            document.getElementById('saveBtn').innerText = "SAVE RECORD / சேமி";
            document.getElementById('name').focus();
        }

        function resetAllFields() { resetEntryFields(); document.getElementById('event').value = ""; document.getElementById('date').valueAsDate = new Date(); }

        function exportToExcel() {
            const search = document.getElementById('search').value.trim();
            const dataToExport = allRecords.filter(d => d.name.toLowerCase().includes(search.toLowerCase()) || d.city.toLowerCase().includes(search.toLowerCase()) || d.event.toLowerCase().includes(search.toLowerCase())).map(({id, ...rest}) => rest);
            const ws = XLSX.utils.json_to_sheet(dataToExport);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Records");
            XLSX.writeFile(wb, `Moy_Pro_Report_${search || 'Full'}_${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        function showSuggestions(field) {
            const val = document.getElementById(field).value.toLowerCase();
            const box = document.getElementById(field + 'Suggestions');
            if(val.length < 1) { box.classList.add('hidden'); return; }
            const suggestions = [...new Set(allRecords.map(r => r[field]))].filter(i => i && i.toLowerCase().includes(val)).slice(0, 5);
            if(suggestions.length > 0) {
                box.innerHTML = suggestions.map(s => `<div class="suggestion-item p-3 border-b text-sm font-bold text-slate-600 hover:bg-indigo-50 cursor-pointer" onclick="selectSuggestion('${field}', '${s}')">${s}</div>`).join('');
                box.classList.remove('hidden');
            } else { box.classList.add('hidden'); }
        }

        function selectSuggestion(field, value) {
            document.getElementById(field).value = value;
            document.getElementById(field + 'Suggestions').classList.add('hidden');
        }

        loadData();

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => console.log('SW Registered')).catch(err => console.log('SW Error', err));
            });
        }
    </script>
</body>
</html>
