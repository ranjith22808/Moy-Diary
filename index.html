<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moy Diary - MultiColor Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f2f5; }
        .glass-header { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .suggestion-box { position: absolute; z-index: 100; width: 100%; background: white; border-radius: 1rem; border: 1px solid #e2e8f0; max-height: 200px; overflow-y: auto; margin-top: 4px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .suggestion-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #f1f5f9; font-weight: 700; color: #374151; }
        .suggestion-item.active { background-color: #eef2ff; color: #4f46e5; }
        .card-received { border-left: 12px solid #10b981; background: #f0fdf4; }
        .card-returned { border-left: 12px solid #f59e0b; background: #fffbeb; }
        .summary-gradient { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); border-bottom: 8px solid #fbbf24; }
    </style>
</head>
<body class="pb-24">

    <div class="glass-header text-white p-8 rounded-b-[3rem] shadow-2xl mb-8">
        <div class="max-w-xl mx-auto text-center">
            <h1 class="text-3xl font-black tracking-tighter">Moy Diary <span class="text-yellow-400">Pro</span></h1>
            <p class="text-[10px] font-bold uppercase tracking-[0.3em] opacity-80 mt-1">Matisha Infotec Edition</p>
        </div>
    </div>

    <div class="max-w-xl mx-auto px-4">
        <div class="bg-white rounded-[2rem] p-6 card-shadow mb-10 border border-gray-100">
            <div class="space-y-4">
                <input type="hidden" id="editId">
                
                <div class="grid grid-cols-2 gap-3 bg-slate-50 p-4 rounded-2xl border border-slate-200">
                    <div class="relative">
                        <label class="text-[9px] font-black text-slate-400 uppercase">விசேஷம் / Event</label>
                        <input id="event" type="text" oninput="handleInput(this, 'event')" onkeydown="handleKeyNavigation(event, 'event')" placeholder="Event Name" class="w-full bg-transparent border-b-2 border-slate-300 py-1 outline-none font-black text-slate-800 uppercase">
                        <div id="eventSuggestions" class="suggestion-box hidden"></div>
                    </div>
                    <div>
                        <label class="text-[9px] font-black text-slate-400 uppercase">தேதி / Date</label>
                        <input id="date" type="date" class="w-full bg-transparent border-b-2 border-slate-300 py-1 outline-none font-black text-slate-800">
                    </div>
                </div>

                <div class="relative">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">ஊர் / Area</label>
                    <input id="city" type="text" oninput="handleInput(this, 'city')" onkeydown="handleKeyNavigation(event, 'city')" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:bg-white focus:border-indigo-500 outline-none font-bold text-slate-700 transition-all uppercase" placeholder="Cuddalore">
                    <div id="citySuggestions" class="suggestion-box hidden"></div>
                </div>

                <div class="relative">
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">பெயர் / Name</label>
                    <input id="name" type="text" oninput="handleInput(this, 'name')" onkeydown="handleKeyNavigation(event, 'name')" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:bg-white focus:border-indigo-500 outline-none font-bold text-slate-700 transition-all" placeholder="Ranjith Kumar">
                    <div id="nameSuggestions" class="suggestion-box hidden"></div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-blue-50 p-3 rounded-2xl border border-blue-100">
                        <label class="text-[9px] font-black text-blue-400 uppercase">பணம் / Cash (₹)</label>
                        <input id="cash" type="number" class="w-full bg-transparent p-1 outline-none font-black text-blue-600 text-xl" placeholder="0">
                    </div>
                    <div class="bg-yellow-50 p-3 rounded-2xl border border-yellow-200">
                        <label class="text-[9px] font-black text-yellow-600 uppercase">தங்கம் / Gold (g)</label>
                        <input id="gold" type="number" step="0.01" class="w-full bg-transparent p-1 outline-none font-black text-yellow-700 text-xl" placeholder="0.00">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <select id="type" class="bg-slate-100 p-4 rounded-2xl font-bold text-slate-600 outline-none border-2 border-transparent focus:border-indigo-500">
                        <option value="Received">வரவு (Received)</option>
                        <option value="Returned">செலுத்தியது (Returned)</option>
                    </select>
                    <textarea id="notes" placeholder="Notes..." class="bg-slate-100 p-3 rounded-2xl h-14 text-sm font-semibold outline-none resize-none border-2 border-transparent focus:border-indigo-500"></textarea>
                </div>

                <div class="flex gap-2 pt-2">
                    <button onclick="saveMoy()" id="saveBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-800 text-white font-black py-5 rounded-3xl shadow-xl transition-all uppercase tracking-widest text-sm">SAVE / சேமி</button>
                    <button onclick="resetAllFields()" class="px-6 bg-red-50 text-red-500 font-black rounded-3xl text-[10px] uppercase">Reset All</button>
                </div>
            </div>
        </div>

        <div class="flex justify-between items-center mb-6 px-2">
            <h3 class="text-xl font-extrabold text-slate-800">Reports</h3>
            <button onclick="exportToExcel()" class="bg-emerald-500 text-white text-[10px] font-bold py-2 px-4 rounded-full shadow-lg uppercase">Excel 📥</button>
        </div>
        
        <input type="text" id="search" onkeyup="renderList()" placeholder="பெயர், ஊர் அல்லது விசேஷம்..." class="w-full bg-white card-shadow rounded-2xl p-5 text-xl outline-none font-black text-indigo-900 border-b-4 border-indigo-500 mb-8">

        <div id="moyList" class="space-y-6"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBLWrs7rGUhfRDuD8dPMZdjjCYMSAtPleM",
            authDomain: "family-dairy-192b9.firebaseapp.com",
            projectId: "family-dairy-192b9",
            storageBucket: "family-dairy-192b9.firebasestorage.app",
            messagingSenderId: "1024399308563",
            appId: "1:1024399308563:web:7eda6313a984c5b3facce6"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        document.getElementById('date').valueAsDate = new Date();
        let allRecords = [];
        let currentFocus = -1;

        function handleInput(el, field) {
            el.value = el.value.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
            showSuggestions(field);
        }

        function handleKeyNavigation(e, field) {
            let x = document.getElementById(field + "Suggestions");
            if (x) x = x.getElementsByClassName("suggestion-item");
            if (e.keyCode == 40) { // Down
                currentFocus++;
                addActive(x);
            } else if (e.keyCode == 38) { // Up
                currentFocus--;
                addActive(x);
            } else if (e.keyCode == 13) { // Enter
                e.preventDefault();
                if (currentFocus > -1) {
                    if (x) x[currentFocus].click();
                }
            }
        }

        function addActive(x) {
            if (!x) return false;
            removeActive(x);
            if (currentFocus >= x.length) currentFocus = 0;
            if (currentFocus < 0) currentFocus = (x.length - 1);
            x[currentFocus].classList.add("active");
            x[currentFocus].scrollIntoView({ block: "nearest" });
        }

        function removeActive(x) {
            for (let i = 0; i < x.length; i++) {
                x[i].classList.remove("active");
            }
        }

        async function saveMoy() {
            const id = document.getElementById('editId').value;
            const name = document.getElementById('name').value.trim();
            const city = document.getElementById('city').value.trim();
            const eventName = document.getElementById('event').value.trim();
            
            if(!name || !city || !eventName) return alert("விவரங்களை நிரப்பவும்!");

            if (!id) {
                const isDup = allRecords.find(r => r.name.toLowerCase() === name.toLowerCase() && r.city.toLowerCase() === city.toLowerCase() && r.event.toLowerCase() === eventName.toLowerCase());
                if (isDup && !confirm(`Duplicate: ${name} ஏற்கனவே உள்ளார். மீண்டும் சேர்க்கவா?`)) return;
            }

            const data = { name, city, cash: Number(document.getElementById('cash').value) || 0, gold: Number(document.getElementById('gold').value) || 0, type: document.getElementById('type').value, event: eventName, notes: document.getElementById('notes').value, date: document.getElementById('date').value };

            if(id) await db.collection("moy_records").doc(id).update(data);
            else await db.collection("moy_records").add(data);
            
            resetEntryFields(); // Only Resets Name, Cash, Gold, Notes
            loadData();
        }

        async function loadData() {
            const snapshot = await db.collection("moy_records").orderBy("date", "desc").get();
            allRecords = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderList();
        }

        function renderList() {
            const search = document.getElementById('search').value.trim();
            const list = document.getElementById('moyList');
            list.innerHTML = "";

            const filtered = allRecords.filter(d => d.name.toLowerCase().includes(search.toLowerCase()) || d.city.toLowerCase().includes(search.toLowerCase()) || d.event.toLowerCase().includes(search.toLowerCase()));

            if(search.length > 2 && filtered.length > 0) {
                let tin = 0, gin = 0, tout = 0, gout = 0;
                filtered.forEach(d => { if(d.type === "Received") { tin += d.cash; gin += d.gold; } else { tout += d.cash; gout += d.gold; } });
                let bCash = tin - tout;
                let bGold = gin - gout;

                list.innerHTML = `
                <div class="summary-gradient text-white p-6 rounded-[2.5rem] mb-8 shadow-2xl relative overflow-hidden">
                    <p class="text-[10px] text-yellow-400 uppercase font-black tracking-widest mb-4 underline decoration-indigo-400 underline-offset-8">${search} - Summary</p>
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-white/10 p-4 rounded-3xl border border-white/20">
                            <p class="text-[9px] text-emerald-300 font-black uppercase tracking-tighter">Received (IN)</p>
                            <p class="text-2xl font-black">₹${tin}</p>
                            <p class="text-[10px] font-bold text-white/50">💍 ${gin.toFixed(2)}g</p>
                        </div>
                        <div class="bg-white/10 p-4 rounded-3xl border border-white/20 text-right">
                            <p class="text-[9px] text-orange-300 font-black uppercase tracking-tighter">Returned (OUT)</p>
                            <p class="text-2xl font-black">₹${tout}</p>
                            <p class="text-[10px] font-bold text-white/50">💍 ${gout.toFixed(2)}g</p>
                        </div>
                    </div>
                    <div class="pt-4 border-t border-white/10 flex justify-between items-center px-2">
                        <span class="text-[10px] font-black uppercase tracking-tighter">Balance பாக்கி:</span>
                        <div class="text-right leading-tight">
                            <p class="text-xl font-black ${bCash > 0 ? 'text-rose-400' : 'text-cyan-400'}">₹${Math.abs(bCash)} <span class="text-xs uppercase">${bCash > 0 ? 'To Give' : 'To Receive'}</span></p>
                            <p class="text-[10px] font-bold text-white/80 italic">${Math.abs(bGold).toFixed(2)}g Gold ${bGold > 0 ? 'To Give' : 'To Receive'}</p>
                        </div>
                    </div>
                </div>`;
            }

            filtered.forEach(d => {
                const isRec = d.type === "Received";
                list.innerHTML += `
                    <div class="card-shadow p-6 rounded-[2rem] ${isRec ? 'card-received' : 'card-returned'} transition-all border border-gray-100 relative">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h4 class="font-black text-slate-800 text-xl leading-tight">${d.name}</h4>
                                <p class="text-[10px] text-indigo-500 font-black uppercase tracking-widest italic">${d.city}</p>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="editMoy('${d.id}')" class="text-blue-600 bg-blue-50 p-2 px-3 rounded-xl text-[9px] font-black uppercase border border-blue-100">Edit</button>
                                <button onclick="deleteMoy('${d.id}')" class="text-rose-500 bg-rose-50 p-2 px-3 rounded-xl text-[9px] font-black uppercase border border-rose-100">Del</button>
                            </div>
                        </div>
                        <div class="bg-slate-800 text-white text-[9px] font-black uppercase tracking-[0.2em] py-2 px-4 rounded-full shadow-md italic inline-block mb-4">🎊 ${d.event}</div>
                        <div class="grid grid-cols-2 text-lg bg-white p-5 rounded-2xl font-black shadow-inner border border-gray-50 italic">
                            <span class="${isRec ? 'text-emerald-600' : 'text-orange-600'}">💵 ₹${d.cash}</span> 
                            <span class="text-right text-yellow-600">💍 ${d.gold}g</span>
                        </div>
                        <div class="mt-4 flex justify-between items-center px-2">
                            ${d.notes ? `<p class="text-[10px] bg-white/60 p-2 rounded-xl font-bold italic text-slate-500 border-l-4 border-indigo-400">Note: ${d.notes}</p>` : '<span></span>'}
                            <span class="text-[9px] text-slate-400 font-black uppercase tracking-widest">${d.date}</span>
                        </div>
                    </div>`;
            });
        }

        function editMoy(id) {
            const d = allRecords.find(r => r.id === id);
            document.getElementById('editId').value = id;
            document.getElementById('name').value = d.name;
            document.getElementById('city').value = d.city;
            document.getElementById('cash').value = d.cash;
            document.getElementById('gold').value = d.gold;
            document.getElementById('type').value = d.type;
            document.getElementById('event').value = d.event;
            document.getElementById('notes').value = d.notes;
            document.getElementById('date').value = d.date;
            document.getElementById('saveBtn').innerText = "Update / திருத்து";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteMoy(id) { if(confirm("Confirm Delete?")) { await db.collection("moy_records").doc(id).delete(); loadData(); } }

        function resetEntryFields() {
            document.getElementById('editId').value = "";
            document.getElementById('name').value = "";
            document.getElementById('cash').value = "";
            document.getElementById('gold').value = "";
            document.getElementById('notes').value = "";
            document.getElementById('saveBtn').innerText = "SAVE / சேமி";
            document.getElementById('name').focus();
        }

        function resetAllFields() {
            resetEntryFields();
            document.getElementById('city').value = "";
            document.getElementById('event').value = "";
            document.getElementById('date').valueAsDate = new Date();
        }

        function exportToExcel() {
            const search = document.getElementById('search').value.trim();
            const dataToExport = allRecords.filter(d => d.name.toLowerCase().includes(search.toLowerCase()) || d.city.toLowerCase().includes(search.toLowerCase()) || d.event.toLowerCase().includes(search.toLowerCase())).map(({id, ...rest}) => rest);
            const ws = XLSX.utils.json_to_sheet(dataToExport);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Records");
            XLSX.writeFile(wb, `Moy_Report_${search || 'Full'}_${new Date().toLocaleDateString()}.xlsx`);
        }

        function showSuggestions(field) {
            const val = document.getElementById(field).value.toLowerCase();
            const box = document.getElementById(field + 'Suggestions');
            currentFocus = -1;
            if(val.length < 1) { box.classList.add('hidden'); return; }
            const suggestions = [...new Set(allRecords.map(r => r[field]))].filter(i => i && i.toLowerCase().includes(val)).slice(0, 5);
            if(suggestions.length > 0) {
                box.innerHTML = suggestions.map((s, idx) => `<div class="suggestion-item" onclick="selectSuggestion('${field}', '${s}')">${s}</div>`).join('');
                box.classList.remove('hidden');
            } else { box.classList.add('hidden'); }
        }

        function selectSuggestion(field, value) {
            document.getElementById(field).value = value;
            document.getElementById(field + 'Suggestions').classList.add('hidden');
            if (field === 'city') document.getElementById('name').focus();
            if (field === 'name') document.getElementById('cash').focus();
        }

        document.addEventListener("click", function (e) {
            document.querySelectorAll('.suggestion-box').forEach(box => box.classList.add('hidden'));
        });

        loadData();
    </script>
</body>
</html>
