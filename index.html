<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moy Diary Pro - Final Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .suggestion-box { position: absolute; z-index: 50; width: 100%; background: white; border: 1px solid #ddd; max-height: 150px; overflow-y: auto; border-radius: 12px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .suggestion-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 14px; font-weight: 700; color: #374151; }
        .suggestion-item:hover { background-color: #eef2ff; color: #4f46e5; }
        input:focus { border-color: #4f46e5 !important; ring: 2px; }
    </style>
</head>
<body class="bg-slate-50 p-3 font-sans pb-28">

    <div class="max-w-xl mx-auto bg-white rounded-[2rem] shadow-2xl p-6 border-t-[10px] border-indigo-600">
        <h2 class="text-2xl font-black text-indigo-700 text-center uppercase tracking-tighter mb-4">Moy Diary / மொய் டைரி</h2>
        
        <div class="space-y-4">
            <input type="hidden" id="editId">
            
            <div class="grid grid-cols-2 gap-3 bg-indigo-50 p-4 rounded-2xl border border-indigo-100 shadow-inner">
                <div class="relative">
                    <label class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">விசேஷம் / Event</label>
                    <input id="event" type="text" oninput="handleInput(this, 'event')" placeholder="எ.கா: திருமணம்" class="w-full bg-transparent border-b-2 border-indigo-200 p-1 outline-none font-black text-indigo-900 uppercase">
                    <div id="eventSuggestions" class="suggestion-box hidden"></div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">தேதி / Date</label>
                    <input id="date" type="date" class="w-full bg-transparent border-b-2 border-indigo-200 p-1 outline-none font-bold text-indigo-900">
                </div>
            </div>

            <div class="relative">
                <label class="text-[10px] font-black text-gray-400 uppercase ml-1">பெயர் / Name</label>
                <input id="name" type="text" oninput="handleInput(this, 'name')" class="w-full border-2 border-gray-100 p-3 rounded-2xl outline-none font-bold" placeholder="Ranjith Kumar">
                <div id="nameSuggestions" class="suggestion-box hidden"></div>
            </div>

            <div class="relative">
                <label class="text-[10px] font-black text-gray-400 uppercase ml-1">ஊர் / Area</label>
                <input id="city" type="text" oninput="handleInput(this, 'city')" class="w-full border-2 border-gray-100 p-3 rounded-2xl outline-none font-bold" placeholder="Cuddalore">
                <div id="citySuggestions" class="suggestion-box hidden"></div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <input id="cash" type="number" placeholder="ரூபாய் / Cash (₹)" class="border-2 border-gray-100 p-4 rounded-2xl outline-none font-black text-indigo-600 text-lg">
                <input id="gold" type="number" step="0.01" placeholder="தங்கம் / Gold (g)" class="border-2 border-gray-100 p-4 rounded-2xl outline-none font-black text-amber-600 text-lg">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <select id="type" class="border-2 border-gray-100 p-3 rounded-2xl bg-white font-black text-gray-600 outline-none">
                    <option value="Received">வரவு (Received)</option>
                    <option value="Returned">செலுத்தியது (Returned)</option>
                </select>
                <textarea id="notes" placeholder="குறிப்பு / Notes..." class="w-full border-2 border-gray-100 p-2 rounded-2xl h-14 text-sm outline-none font-medium"></textarea>
            </div>

            <div class="flex gap-2 pt-2">
                <button onclick="saveMoy()" id="saveBtn" class="flex-1 bg-indigo-600 text-white font-black py-4 rounded-[1.5rem] shadow-lg active:scale-95 transition-all text-lg">SAVE / சேமி</button>
                <button onclick="resetAllFields()" class="bg-slate-100 text-slate-500 font-bold px-5 rounded-[1.5rem] text-[10px] uppercase">Reset All</button>
            </div>
        </div>
    </div>

    <div class="max-w-xl mx-auto mt-8">
        <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-gray-50 mb-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-black text-indigo-300 text-[10px] uppercase tracking-[0.2em]">Search Reports</h3>
                <button onclick="exportToExcel()" class="bg-emerald-500 text-white text-[10px] font-black py-2 px-4 rounded-xl shadow-md flex items-center gap-1 transition-all hover:bg-emerald-600 uppercase">Excel 📥</button>
            </div>
            <input type="text" id="search" onkeyup="renderList()" placeholder="Type Name, Area or Event..." class="w-full border-b-4 border-indigo-100 p-2 text-2xl outline-none font-black text-indigo-900 placeholder-indigo-50">
        </div>

        <div id="moyList" class="space-y-4"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBLWrs7rGUhfRDuD8dPMZdjjCYMSAtPleM",
            authDomain: "family-dairy-192b9.firebaseapp.com",
            projectId: "family-dairy-192b9",
            storageBucket: "family-dairy-192b9.firebasestorage.app",
            messagingSenderId: "1024399308563",
            appId: "1:1024399308563:web:7eda6313a984c5b3facce6"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        document.getElementById('date').valueAsDate = new Date();
        let allRecords = [];

        function handleInput(el, field) {
            el.value = el.value.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
            showSuggestions(field);
        }

        async function saveMoy() {
            const id = document.getElementById('editId').value;
            const name = document.getElementById('name').value.trim();
            const city = document.getElementById('city').value.trim();
            const eventName = document.getElementById('event').value.trim();
            
            if(!name || !city || !eventName) return alert("பெயர், ஊர் மற்றும் விசேஷம் அவசியம்!");

            if (!id) {
                const isDup = allRecords.find(r => r.name.toLowerCase() === name.toLowerCase() && r.city.toLowerCase() === city.toLowerCase() && r.event.toLowerCase() === eventName.toLowerCase());
                if (isDup && !confirm(`Duplicate: ${name} ஏற்கனவே இந்த விசேஷத்தில் உள்ளார். மீண்டும் சேர்க்கவா?`)) return;
            }

            const data = { name, city, cash: Number(document.getElementById('cash').value) || 0, gold: Number(document.getElementById('gold').value) || 0, type: document.getElementById('type').value, event: eventName, notes: document.getElementById('notes').value, date: document.getElementById('date').value };

            if(id) await db.collection("moy_records").doc(id).update(data);
            else await db.collection("moy_records").add(data);
            
            resetEntryFields();
            loadData();
        }

        async function loadData() {
            const snapshot = await db.collection("moy_records").orderBy("date", "desc").get();
            allRecords = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderList();
        }

        function renderList() {
            const search = document.getElementById('search').value.trim();
            const searchLower = search.toLowerCase();
            const list = document.getElementById('moyList');
            list.innerHTML = "";

            const filtered = allRecords.filter(d => d.name.toLowerCase().includes(searchLower) || d.city.toLowerCase().includes(searchLower) || d.event.toLowerCase().includes(searchLower));

            if(search.length > 2 && filtered.length > 0) {
                let tin = 0, gin = 0, tout = 0, gout = 0;
                filtered.forEach(d => { if(d.type === "Received") { tin += d.cash; gin += d.gold; } else { tout += d.cash; gout += d.gold; } });

                let bCash = tin - tout;
                let bGold = gin - gout;
                const displayTitle = search.charAt(0).toUpperCase() + search.slice(1).toLowerCase();

                list.innerHTML = `
                <div class="bg-indigo-900 text-white p-6 rounded-[2rem] mb-8 shadow-2xl border-b-[12px] border-yellow-400">
                    <p class="text-[10px] opacity-60 uppercase font-black tracking-widest mb-4 underline decoration-indigo-500 underline-offset-4">${displayTitle} - Account Summary</p>
                    <div class="grid grid-cols-2 gap-4 mb-6 text-center">
                        <div class="bg-indigo-950/40 p-3 rounded-2xl border border-indigo-800">
                            <p class="text-[10px] text-green-400 font-black uppercase">பெற்றது (IN)</p>
                            <p class="text-2xl font-black italic">₹${tin}</p>
                            <p class="text-[10px] font-bold text-indigo-300">💍 ${gin.toFixed(2)}g Gold</p>
                        </div>
                        <div class="bg-indigo-950/40 p-3 rounded-2xl border border-indigo-800">
                            <p class="text-[10px] text-orange-400 font-black uppercase">செலுத்தியது (OUT)</p>
                            <p class="text-2xl font-black italic">₹${tout}</p>
                            <p class="text-[10px] font-bold text-indigo-300">💍 ${gout.toFixed(2)}g Gold</p>
                        </div>
                    </div>
                    <div class="pt-4 border-t border-indigo-800 flex justify-between items-center">
                        <span class="text-[10px] font-black uppercase tracking-tighter">Balance பாக்கி:</span>
                        <div class="text-right leading-tight">
                            <p class="text-xl font-black ${bCash > 0 ? 'text-rose-400' : 'text-cyan-400'}">
                                ₹${Math.abs(bCash)} <span class="text-xs uppercase">${bCash > 0 ? 'To Give / தர வேண்டும்' : 'To Receive / வர வேண்டும்'}</span>
                            </p>
                            <p class="text-xs font-black italic ${bGold > 0 ? 'text-rose-400' : 'text-cyan-400'}">
                                ${Math.abs(bGold).toFixed(2)}g Gold <span class="text-[9px] uppercase">${bGold > 0 ? 'To Give / தர வேண்டும்' : 'To Receive / வர வேண்டும்'}</span>
                            </p>
                        </div>
                    </div>
                </div>`;
            }

            filtered.forEach(d => {
                const isRec = d.type === "Received";
                list.innerHTML += `
                    <div class="bg-white p-5 rounded-[2rem] shadow-sm border-l-[15px] ${isRec ? 'border-green-500' : 'border-orange-500'} transition-all hover:shadow-lg">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <h4 class="font-black text-gray-800 text-xl leading-none mb-1">${d.name}</h4>
                                <p class="text-[11px] text-indigo-500 font-black uppercase tracking-widest">${d.city}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="editMoy('${d.id}')" class="text-indigo-600 text-[10px] font-black bg-indigo-50 p-2 px-3 rounded-xl uppercase">Edit</button>
                                <button onclick="deleteMoy('${d.id}')" class="text-rose-600 text-[10px] font-black bg-rose-50 p-2 px-3 rounded-xl uppercase">Del</button>
                            </div>
                        </div>
                        
                        <div class="bg-slate-900 text-white text-[10px] font-black uppercase tracking-[0.2em] py-1.5 px-4 rounded-full inline-block mb-4 shadow-sm">
                            🎊 ${d.event}
                        </div>

                        <div class="grid grid-cols-2 text-base bg-slate-50 p-4 rounded-2xl font-black border border-slate-100 shadow-inner italic">
                            <span class="text-slate-700">💵 ₹${d.cash}</span> 
                            <span class="text-slate-700 text-right">💍 ${d.gold}g</span>
                        </div>
                        
                        <div class="flex justify-between items-center mt-4">
                             ${d.notes ? `<p class="text-[10px] bg-amber-50 text-amber-800 p-2 rounded-xl font-bold italic border-l-4 border-amber-300">Note: ${d.notes}</p>` : '<span></span>'}
                             <p class="text-[9px] text-gray-300 font-black uppercase tracking-widest">${d.date}</p>
                        </div>
                    </div>`;
            });
        }

        function editMoy(id) {
            const d = allRecords.find(r => r.id === id);
            document.getElementById('editId').value = id;
            document.getElementById('name').value = d.name;
            document.getElementById('city').value = d.city;
            document.getElementById('cash').value = d.cash;
            document.getElementById('gold').value = d.gold;
            document.getElementById('type').value = d.type;
            document.getElementById('event').value = d.event;
            document.getElementById('notes').value = d.notes;
            document.getElementById('date').value = d.date;
            document.getElementById('saveBtn').innerText = "UPDATE / திருத்து";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteMoy(id) { if(confirm("Permanently Delete?")) { await db.collection("moy_records").doc(id).delete(); loadData(); } }

        function resetEntryFields() {
            document.getElementById('editId').value = "";
            document.getElementById('name').value = "";
            document.getElementById('city').value = "";
            document.getElementById('cash').value = "";
            document.getElementById('gold').value = "";
            document.getElementById('notes').value = "";
            document.getElementById('saveBtn').innerText = "SAVE / சேமி";
            document.getElementById('name').focus();
        }

        function resetAllFields() { resetEntryFields(); document.getElementById('event').value = ""; document.getElementById('date').valueAsDate = new Date(); }

        function exportToExcel() {
            const search = document.getElementById('search').value.trim();
            const dataToExport = allRecords.filter(d => d.name.toLowerCase().includes(search.toLowerCase()) || d.city.toLowerCase().includes(search.toLowerCase()) || d.event.toLowerCase().includes(search.toLowerCase())).map(({id, ...rest}) => rest);
            const ws = XLSX.utils.json_to_sheet(dataToExport);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Records");
            XLSX.writeFile(wb, `Moy_Report_${search || 'Full'}_${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        function showSuggestions(field) {
            const val = document.getElementById(field).value.toLowerCase();
            const box = document.getElementById(field + 'Suggestions');
            if(val.length < 1) { box.classList.add('hidden'); return; }
            const suggestions = [...new Set(allRecords.map(r => r[field]))].filter(i => i && i.toLowerCase().includes(val)).slice(0, 5);
            if(suggestions.length > 0) {
                box.innerHTML = suggestions.map(s => `<div class="suggestion-item" onclick="selectSuggestion('${field}', '${s}')">${s}</div>`).join('');
                box.classList.remove('hidden');
            } else { box.classList.add('hidden'); }
        }

        function selectSuggestion(field, value) {
            document.getElementById(field).value = value;
            document.getElementById(field + 'Suggestions').classList.add('hidden');
        }

        loadData();
    </script>
</body>
</html>
